<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#00416B">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/intra/styles/app-shell.css"/>

<style>
/* Tokens remapeados para a paleta atual do CRM (navy #073B5C / azul #0877B8) — classes internas preservadas */
:root{
  --bg:#F4F7FB;
  --sf:#fff;
  --sf2:#EFF6FB;
  --ln:#DCE6EF;
  --ln2:#C3D2E0;
  --nv:#073B5C;
  --nvd:#052B43;
  --nvl:#0B4E78;
  --bl:#0877B8;
  --bls:#E9F5FF;
  --blp:#EFF6FB;
  --gd:#0877B8;
  --gdd:#065C8E;
  --gds:#E9F5FF;
  --tx:#17354B;
  --mt:#647B8C;
  --ok:#15803D;
  --oks:#DCFCE7;
  --wr:#B45309;
  --wrs:#FEF3C7;
  --dn:#B42318;
  --dns:#FEE2E2;
  --r:14px;
  --rs:8px;
  --sh:0 12px 30px rgba(0,65,107,.08);
}

/* Reset/body handled by app-shell.css */

.pg{
  max-width:100%;
  padding:0;
}


   /* Tabs — estilo segmented control (manual) */
.tabs{
  display:flex;
  gap:2px;
  padding:3px;
  border-radius:999px;
  background:#ECEEF3;
  margin-bottom:10px;
  max-width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  flex-wrap:nowrap;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}

.tabs::-webkit-scrollbar{
  display:none;
}

.tab{
  flex:1 1 0;
  min-width:0;
  text-align:center;
  border:none;
  background:transparent;
  color:var(--mt);
  border-radius:999px;
  padding:10px 12px;
  font:700 13px/1.1 inherit;
  cursor:pointer;
  white-space:nowrap;
  transition:.2s;
}

.tab:hover{
  background:rgba(0,65,107,.06);
  color:var(--nv);
}

.tab.on{
  background:var(--nv);
  color:#fff;
  box-shadow:0 1px 4px rgba(0,65,107,.25);
}

@media(max-width:720px){
  .tabs{
    padding:3px;                   /* reduz espaço interno no mobile */
    gap:2px;                       /* mantém abas próximas */
  }

  .tab{
    flex:0 0 auto;                 /* cada aba ocupa só o necessário */
    padding:9px 10px;              /* tamanho confortável no toque */
    font-size:11px;                /* texto um pouco menor */
  }
}
/* =========================================================
   7) BARRA DE FILTROS
   ---------------------------------------------------------
   .fb = filtro box
   .fb .f = bloco individual de campo
   .fb .f label = label dentro do bloco
   ========================================================= */
.fb{
  background:var(--sf);
  border:1px solid var(--ln);
  border-radius:20px;
  padding:10px 14px;
  margin-bottom:10px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 6px;
  box-shadow:var(--sh);
}

.fb .f{
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width:0;
}

.fb .f label{
  font-size:9px;
  font-weight:800;
  color:var(--mt);
  text-transform:uppercase;
  letter-spacing:.04em;
}

.fb input,
.fb select{
  height:36px;
  border:1px solid var(--ln);
  border-radius:var(--r);
  background:var(--sf2);
  color:var(--tx);
  padding:0 10px;
  font:inherit;
  font-size:12px;
  outline:none;
  min-width:0;
  width:100%;
  transition:border-color .15s,box-shadow .15s;
}

.fb input:focus,
.fb select:focus{
  border-color:var(--nv);
  box-shadow:0 0 0 3px rgba(0,65,107,.08);
}

/* campos ocupam grid corretamente */
.fb .fm{} .fb .fd{} .fb .fs{}
.fb .fq{
  grid-column:1/-1;
}
.fb .chs{
  grid-column:1/-1;
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}
.fb #aBtn{
  grid-column:1/-1;
  justify-self:start;
}

/* =========================================================
   8) CHIPS / BOTÕES PEQUENOS
   ---------------------------------------------------------
   .chs = container dos chips
   .ch = cada chip
   .ch.on = chip ativo
   ========================================================= */
.chs{
  display:flex;
  gap:4px;
  align-items:flex-end;
}

.ch{
  border:1px solid var(--ln); /* borda */
  background:#fff;            /* fundo branco */
  color:var(--mt);            /* texto secundário */
  border-radius:999px;        /* formato de pílula */
  padding:6px 10px;           /* espaço interno */
  font:800 11px/1 inherit;    /* texto forte pequeno */
  cursor:pointer;             /* cursor */
  white-space:nowrap;         /* não quebra */
  height:34px;                /* altura padrão */
  display:flex;               /* centralização flex */
  align-items:center;         /* centraliza verticalmente */
}

.ch:hover,
.ch.on{
  background:var(--nv);       /* ativo = azul */
  color:#fff;                 /* texto branco */
  border-color:var(--nv);     /* borda azul */
}

/* =========================================================
   9) CAIXA DE CONTEXTO
   ---------------------------------------------------------
   .cx = linha com contexto do filtro
   .pill = cápsulas com informações
   ========================================================= */
.cx{
  padding:8px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  flex-wrap:wrap;
  background:var(--sf);
  border:1px solid var(--ln);
  border-radius:999px;
  margin-bottom:10px;
  font-size:11px;
  font-weight:700;
  color:var(--mt);
}

.pill{
  background:var(--bls);
  border:1px solid var(--ln);
  border-radius:999px;
  padding:3px 8px;
  font-size:10px;
  font-weight:800;
  color:var(--nv);
}

/* =========================================================
   10) VIEWS / TELAS
   ---------------------------------------------------------
   .vw = cada seção de view
   .vw.on = view visível
   ========================================================= */
.vw{
  display:none;
}

.vw.on{
  display:block;
}

/* =========================================================
   11) GRIDS GENÉRICOS
   ---------------------------------------------------------
   .g = base do grid
   .g4 = 4 colunas
   .g3 = 3 colunas
   etc.
   ========================================================= */
.g{
  display:grid;
  gap:8px;
}

.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:1fr 1fr;}
.g7{grid-template-columns:repeat(7,1fr);}
.g6{grid-template-columns:repeat(6,minmax(150px,1fr));}
/* AÇÕES: ajuste isolado para os cards não estourarem o container do Dashboard.
   Não altera os grids das outras abas. */
.ac-kpi-grid{
  width:100%;
  max-width:100%;
  grid-template-columns:repeat(6,minmax(0,1fr));
}
.ac-kpi-grid>.k{
  min-width:0;
  padding:14px 12px;
}
.ac-kpi-grid .k-l,
.ac-kpi-grid .k-n{
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
@media(max-width:980px){.ac-kpi-grid{grid-template-columns:repeat(3,minmax(0,1fr));}}
@media(max-width:560px){.ac-kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}

/* AÇÕES: Carteira Inteligente compacta, sem scroll horizontal.
   Escopo fechado na tabela #cTbl para não afetar outras abas. */
.ac-wallet-wrap{
  max-height:620px;
  overflow-y:auto;
  overflow-x:hidden;
}
.ac-wallet-table{
  width:100%;
  table-layout:fixed;
  font-size:10px;
}
.ac-wallet-table th,
.ac-wallet-table td{
  padding:4px 5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  vertical-align:middle;
}
.ac-wallet-table th:nth-child(1),
.ac-wallet-table td:nth-child(1){width:21%;}
.ac-wallet-table th:nth-child(2),
.ac-wallet-table td:nth-child(2){width:9%;}
.ac-wallet-table th:nth-child(3),
.ac-wallet-table td:nth-child(3){width:8%;}
.ac-wallet-table th:nth-child(4),
.ac-wallet-table td:nth-child(4){width:9%;}
.ac-wallet-table th:nth-child(5),
.ac-wallet-table td:nth-child(5){width:7%;}
.ac-wallet-table th:nth-child(6),
.ac-wallet-table td:nth-child(6){width:13%;}
.ac-wallet-table th:nth-child(7),
.ac-wallet-table td:nth-child(7){width:9%;}
.ac-wallet-table th:nth-child(8),
.ac-wallet-table td:nth-child(8){width:6%;}
.ac-wallet-table th:nth-child(9),
.ac-wallet-table td:nth-child(9){width:9%;}
.ac-wallet-table th:nth-child(10),
.ac-wallet-table td:nth-child(10){width:5%;}
.ac-wallet-table th:nth-child(11),
.ac-wallet-table td:nth-child(11){width:4%;}
.ac-wallet-table .cli-cell{max-width:100%;}
.ac-wallet-table .bg{font-size:8px;padding:2px 5px;}
.ac-wallet-table .tk-hl{font-weight:800;}
@media(max-width:980px){
  .ac-wallet-wrap{overflow-x:auto;}
  .ac-wallet-table{min-width:760px;}
}
.g14{grid-template-columns:1fr 3fr;}
.g41{grid-template-columns:3fr 1fr;}

/* =========================================================
   12) CARDS KPI
   ---------------------------------------------------------
   .k = card KPI
   .k-l = label
   .k-v = valor
   .k-n = nota auxiliar
   .k-bar = barra inferior
   .k-s = filete lateral colorido
   ========================================================= */
.k{
  background:var(--sf);
  border:1px solid var(--ln);
  border-radius:20px;
  padding:14px;
  box-shadow:var(--sh);
  position:relative;
  overflow:hidden;
}

.k-l{
  font-size:9px;
  font-weight:800;
  color:var(--mt);
  text-transform:uppercase;
  letter-spacing:.05em;
  margin-bottom:5px;
}

.k-v{
  font-size:22px;
  font-weight:900;
  letter-spacing:-.03em;
  line-height:1.1;
}

.k-n{
  font-size:10px;
  color:var(--mt);
  font-weight:700;
  margin-top:4px;
  display:flex;
  gap:4px;
  align-items:center;
  flex-wrap:wrap;
}

.k-bar{
  margin-top:6px;
  height:5px;
  border-radius:999px;
  background:#edf1f5;
  overflow:hidden;
}

.k-bar>div{
  height:100%;
  border-radius:999px;
}

.k-s{
  position:absolute;
  top:0;
  left:0;
  width:3px;
  height:100%;
}

.k-s.bl{background:var(--bl);}
.k-s.gd{background:var(--gd);}
.k-s.gn{background:var(--ok);}
.k-s.rd{background:var(--dn);}
.k-s.conv{background:#f2b705;}
.k-s.fid{background:var(--ok);}
.k-s.man{background:#8b5cf6;}
.k-s.resg{background:var(--dn);}
.k-s.canc{background:#9aa3ad;}
.k.ac-total{background:#fff8db;border-color:#f5df8a;}

/* =========================================================
   13) DELTAS / VARIAÇÕES
   ---------------------------------------------------------
   .dl = variação numérica
   .dl.up = subida
   .dl.dn = queda
   .dl.fl = estável
   ========================================================= */
.dl{
  font-weight:800;
  font-size:10px;
}

.dl.up{color:var(--ok);}
.dl.dn{color:var(--dn);}
.dl.fl{color:var(--mt);}

.dl.up::before{content:'▲ ';}
.dl.dn::before{content:'▼ ';}

/* =========================================================
   14) BOXES GENÉRICOS
   ---------------------------------------------------------
   .bx = caixa branca padrão
   .bx-t = título da caixa
   .bx-sub = subtítulo
   ========================================================= */
.bx{
  background:var(--sf);
  border:1px solid var(--ln);
  border-radius:20px;
  padding:14px;
  box-shadow:var(--sh);
}

.bx-t{
  font-size:12px;
  font-weight:900;
  color:var(--nv);
  margin-bottom:8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  flex-wrap:wrap;
}

.bx-sub{
  font-size:10px;
  color:var(--mt);
  font-weight:700;
}

/* =========================================================
   15) BADGES
   ---------------------------------------------------------
   .bg = badge genérica
   .b-ok / .b-wr / .b-dn / etc = variações
   ========================================================= */
.bg{
  display:inline-block;
  padding:2px 6px;
  border-radius:999px;
  font-size:9px;
  font-weight:900;
  white-space:nowrap;
}

.b-ok{background:var(--oks);color:#1b6d34;}
.b-wr{background:var(--wrs);color:#8a6a00;}
.b-dn{background:var(--dns);color:#9a2a22;}
.b-bl{background:var(--bls);color:#0052a3;}
.b-gd{background:var(--gds);color:#8a6a00;}
.b-mt{background:#edf1f5;color:var(--mt);}
.b-lil{background:#f1e8ff;color:#6d28d9;}
.b-nv{background:#e0f2fe;color:#0369a1;}

/* =========================================================
   16) TABELAS
   ---------------------------------------------------------
   .tw = wrapper com rolagem
   table / th / td = estilos base
   ========================================================= */
.tw{
  overflow:auto;
  max-height:480px;
  border-radius:var(--r);
  border:1px solid var(--ln);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:11px;
  background:#fff;
}

th,td{
  padding:6px 8px;
  border-bottom:1px solid var(--ln);
  text-align:left;
  vertical-align:top;
}

th{
  position:sticky;
  top:0;
  z-index:1;
  background:var(--sf2);
  font-size:9px;
  text-transform:uppercase;
  color:var(--mt);
  letter-spacing:.04em;
  font-weight:800;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
}

th:hover{
  color:var(--nv);
}

th .sa{
  font-size:8px;
  margin-left:2px;
  opacity:.4;
}

th.asc .sa,
th.desc .sa{
  opacity:1;
}

/* =========================================================
   17) BARRAS HORIZONTAIS
   ---------------------------------------------------------
   Usadas nos rankings
   ========================================================= */
.bars{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.barr{
  display:grid;
  grid-template-columns:50px 1fr 75px;
  gap:5px;
  align-items:center;
}

.barn{
  font-weight:800;
  color:var(--tx);
  font-size:10px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.bart{
  height:7px;
  border-radius:999px;
  background:#edf1f5;
  overflow:hidden;
}

.barf{
  height:100%;
  background:var(--bl);
  border-radius:999px;
}

.barv{
  text-align:right;
  font-weight:800;
  color:var(--tx);
  font-size:10px;
}

/* =========================================================
   18) DONUT + LEGENDA
   ========================================================= */
.dw{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

.dcv{
  width:130px;
  height:130px;
  flex:0 0 auto;
}

.leg{
  display:flex;
  flex-direction:column;
  gap:3px;
  flex:1;
  min-width:140px;
}

.lr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:3px;
}

.ll{
  display:flex;
  align-items:center;
  gap:4px;
  min-width:0;
  overflow:hidden;
}

.dt{
  width:8px;
  height:8px;
  border-radius:50%;
  flex:0 0 auto;
}

.llb{
  font-size:9px;
  font-weight:800;
  color:var(--tx);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.lv{
  font-size:9px;
  font-weight:800;
  color:var(--mt);
  white-space:nowrap;
}

/* =========================================================
   19) MATRIZ / RAIO-X
   ========================================================= */
.mw{
  overflow:auto;
  max-height:600px;
  border:1px solid var(--ln);
  border-radius:var(--rs);
}

.mw table th,
.mw table td{
  padding:4px 5px;
  font-size:10px;
  text-align:center;
  white-space:nowrap;
}

.mw table th:first-child,
.mw table td:first-child{
  text-align:left;
  position:sticky;
  left:0;
  background:#fff;
  z-index:2;
  min-width:100px;
  max-width:140px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.mw table th:first-child{
  background:var(--sf2);
  z-index:3;
}

.mw table th{
  background:var(--sf2);
}

/* classes de status da matriz */
.m-ok{background:#edf7f0;color:#1b6d34;font-weight:800;}
.m-al{background:#d4f5dd;color:#0d5221;font-weight:900;}
.m-qu{background:#fce8e8;color:#9a2a22;font-weight:800;}
.m-in{background:#e74c3c;color:#fff;font-weight:900;}
.m-sm{background:#fafafa;color:#ccc;}
.m-es{background:#eaf2fb;color:var(--nv);font-weight:800;}
.m-at{background:var(--blp);color:var(--bl);font-weight:800;}

/* =========================================================
   20) CALL-OUTS / NAVEGAÇÃO / STATUS
   ========================================================= */
.call{
  background:var(--blp);
  border:1px solid #cce0f5;
  border-radius:var(--rs);
  padding:8px;
}

.dnav{
  display:flex;
  align-items:center;
  gap:5px;
  flex-wrap:wrap;
}

.abtn{
  border:1px solid var(--ln);
  background:#fff;
  border-radius:var(--rs);
  padding:5px 8px;
  font:900 12px/1 inherit;
  cursor:pointer;
}

.abtn[disabled]{
  opacity:.3;
  cursor:not-allowed;
}

/* barra de status / loading / erro */
.stb{
  display:none;
  border-radius:var(--r);
  padding:10px 14px;
  font-size:13px;
  font-weight:700;
  margin-bottom:10px;
}

.stb.ld{
  display:block;
  background:var(--bls);
  color:var(--nv);
  border:1px solid var(--ln);
}

.stb.er{
  display:block;
  background:var(--dns);
  color:#8a2018;
  border:1px solid #f5c2bf;
}

/* =========================================================
   21) RODAPÉ E DETALHES
   ========================================================= */
.ftn{
  text-align:center;
  color:var(--mt);
  font-size:10px;
  font-weight:700;
  padding:6px 0;
  margin-top:6px;
}

.medal{
  font-size:13px;
  margin-right:1px;
}

.tk-hl{
  background:var(--gds);
  font-weight:900;
}

/* =========================================================
   22) CARDS DE TENDÊNCIA
   ========================================================= */
.tend-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.tend-card{
  text-align:center;
  padding:10px 8px;
}

.tend-label{
  font-size:10px;
  font-weight:800;
  color:var(--mt);
  text-transform:uppercase;
  margin-bottom:4px;
}

.tend-val{
  font-size:20px;
  font-weight:900;
}

.tend-icon{
  font-size:18px;
  margin-left:4px;
}

/* =========================================================
   23) RESPONSIVO
   ========================================================= */
@media(max-width:900px){
  .g4,.g3{
    grid-template-columns:1fr 1fr;
  }

  .g7{
    grid-template-columns:repeat(4,1fr);
  }

  .g14,.g41{
    grid-template-columns:1fr;
  }
}

@media(max-width:600px){
  .g4,.g3,.g2{
    grid-template-columns:1fr;
  }

  .pg{
    padding:0;
  }

  .k-v{
    font-size:18px;
  }

  .tend-val{
    font-size:16px;
  }
}
 /* ═══ FILTRO DE PERÍODO — compacto, alinhado ao design system ═══ */
 .period-shell{grid-column:1/-1;display:grid;gap:8px}
 .period-title{font-size:11px;font-weight:800;color:var(--mt);text-transform:uppercase;letter-spacing:.04em;line-height:1}
 .period-bar{display:flex;flex-wrap:wrap;gap:5px}
 .period-chip{border:1px solid var(--ln);background:var(--sf);color:var(--tx);border-radius:999px;padding:0 12px;min-height:30px;font:700 12px/1 inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
 .period-chip:hover{border-color:var(--ln2);background:var(--sf2)}
 .period-chip.on{border-color:var(--nv);background:var(--bls);color:var(--nv);font-weight:800}
 .period-stage{display:grid;gap:8px}
 /* Linha única: ◀ [input] ▶ */
 .period-row{display:none;align-items:center;gap:6px}
 .period-row.show{display:flex}

<script>
/* =========================================================
   1) FORMATADORES E HELPERS DE TEXTO
   ---------------------------------------------------------
   Essas funções transformam valores em HTML pronto ou texto.
   ========================================================= */

/*
  E(s)
  ----------------------------------------------------------
  Escapa texto para evitar quebrar HTML.
*/
function E(s){
  if(s==null)return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

/*
  M(v)
  ----------------------------------------------------------
  Formata moeda brasileira.
*/
function M(v){
  return 'R$ '+(+v||0).toLocaleString('pt-BR',{
    minimumFractionDigits:2,
    maximumFractionDigits:2
  });
}

/*
  N(v)
  ----------------------------------------------------------
  Formata número simples com até 1 casa.
*/
function N(v){
  return (+v||0).toLocaleString('pt-BR',{
    maximumFractionDigits:1
  });
}

/*
  P(v)
  ----------------------------------------------------------
  Formata percentual.
*/
function P(v){
  return (+v||0).toFixed(1).replace('.',',')+' %';
}

/*
  Cp(v)
  ----------------------------------------------------------
  Formato compacto:
  1.200 -> 1,2K
  1.500.000 -> 1,5M
  Senão, usa moeda normal.
*/
function Cp(v){
  var n=+v||0;
  if(n>=1e6)return (n/1e6).toFixed(1).replace('.',',')+'M';
  if(n>=1e3)return (n/1e3).toFixed(1).replace('.',',')+'K';
  return M(n);
}

/*
  Fd(d)
  ----------------------------------------------------------
  Exibe dias no formato "10d"
*/
function Fd(d){
  return (+d||0)+'d';
}

/*
  dH(v)
  ----------------------------------------------------------
  Devolve HTML com variação:
  - positivo = verde
  - negativo = vermelho
  - nulo = badge neutra
*/
function dH(v){
  if(v==null)return '<span class="bg b-mt">—</span>';
  var n=+v;
  return n>0
    ?'<span class="dl up">'+P(Math.abs(n))+'</span>'
    :n<0
      ?'<span class="dl dn">'+P(Math.abs(n))+'</span>'
      :'<span class="dl fl">0 %</span>';
}

/* =========================================================
   2) BUILDERS PEQUENOS DE HTML
   ---------------------------------------------------------
   Essas funções montam trechos visuais prontos.
   ========================================================= */

/*
  K(o)
  ----------------------------------------------------------
  Monta um card KPI.
  Campos esperados:
  - t  = título
  - v  = valor
  - n  = nota
  - d  = delta
  - s  = filete lateral
  - p  = percentual da barrinha
  - bc = cor da barrinha
*/
function K(o){

/* contador usado nos gráficos donut */
var dnC=0;

/*
  rD(data,ttl,fmtV)
  ----------------------------------------------------------
  Renderiza donut + legenda.

  data = [{label:'x', value:123}, ...]
  ttl = título
  fmtV = formatador dos valores
*/
function rD(data,ttl,fmtV){
  var vF=fmtV||M;

  /* pega somente itens positivos e limita a 8 */
  var a=(data||[]).filter(function(x){
    return +(x.value||0)>0;
  }).slice(0,8);

  var tot=a.reduce(function(s,x){
    return s+Number(x.value||0);
  },0);

  if(!a.length||tot<=0){
    return '<div class="bx"><div class="bx-t">'+ttl+'</div><span style="color:var(--mt)">Sem dados.</span></div>';
  }

  var cs=['#003366','#0066b3','#1e8e3e','#e6a700','#d93025','#5a6d82','#7c3aed','#0891b2'];
  var id='d'+(++dnC);

  /* legenda */
  var lg=a.map(function(x,i){
    var p=(+x.value/tot)*100;
    return '<div class="lr">'+
             '<div class="ll">'+
               '<span class="dt" style="background:'+cs[i%8]+'"></span>'+
               '<span class="llb">'+E(x.label)+'</span>'+
             '</div>'+
             '<span class="lv">'+P(p)+' ('+vF(x.value)+')</span>'+
           '</div>';
  }).join('');

  /*
    Desenha o donut depois de o canvas existir no DOM.
  */
  setTimeout(function(){
    var cv=document.getElementById(id);
    if(!cv)return;

    var ct=cv.getContext('2d'),
        sz=cv.width,
        cx=sz/2,
        cy=sz/2,
        R=sz*.42,
        H=sz*.26,
        sa=-Math.PI/2;

    a.forEach(function(x,i){
      var p=+x.value/tot,
          ea=sa+p*2*Math.PI;

      ct.beginPath();
      ct.moveTo(cx+Math.cos(sa)*H,cy+Math.sin(sa)*H);
      ct.arc(cx,cy,R,sa,ea);
      ct.arc(cx,cy,H,ea,sa,true);
      ct.closePath();
      ct.fillStyle=cs[i%8];
      ct.fill();

      sa=ea;
    });

    /* centro branco */
    ct.fillStyle='#fff';
    ct.beginPath();
    ct.arc(cx,cy,H,0,2*Math.PI);
    ct.fill();

    /* texto central */
    ct.fillStyle='#1a2332';
    ct.font='700 11px Source Sans 3,sans-serif';
    ct.textAlign='center';
    ct.textBaseline='middle';
    ct.fillText(fmtV===N?N(tot):Cp(tot),cx,cy);
  },50);

  return '<div class="bx"><div class="bx-t">'+ttl+'</div><div class="dw"><canvas id="'+id+'" class="dcv" width="130" height="130"></canvas><div class="leg">'+lg+'</div></div></div>';
}

async function api(p){
  var u=new URL(API);

  Object.entries(p||{}).forEach(function(e){
    if(e[1]!=null&&e[1]!=='')u.searchParams.set(e[0],e[1]);
  });

  var r=await fetch(u);
  var t=await r.text();
  var d;

  try{
    d=JSON.parse(t);
  }catch(e){
    throw new Error('API não retornou JSON.');
  }

}

/* =========================================================
   7) ORDENAÇÃO DE TABELAS
   ---------------------------------------------------------
   sortTbl(tblId,colIdx,type)
   type = "str" ou "num"
   ========================================================= */
function sortTbl(tblId,colIdx,type){
  var tbl=document.getElementById(tblId); if(!tbl) return;
  var tb=tbl.tBodies && tbl.tBodies[0]; if(!tb) return;
  var rows=[].slice.call(tb.rows||[]);
  var asc=tbl.getAttribute('data-sort-col')!=String(colIdx)||tbl.getAttribute('data-sort-dir')!=='asc';
  function numFrom(v){
    var s=(v||'').toString().trim();
    if(!s) return 0;
    if(/\d+d$/i.test(s)) return parseFloat(s.replace(/[^\d.-]/g,''))||0;
    s=s.replace(/R\$/gi,'').replace(/%/g,'').replace(/\./g,'').replace(',', '.').replace(/[^0-9\-.]/g,'');
    var n=parseFloat(s); return isNaN(n)?0:n;
  }
  rows.sort(function(a,b){
    var av=((a.cells[colIdx]&&a.cells[colIdx].innerText)||'').trim();
    var bv=((b.cells[colIdx]&&b.cells[colIdx].innerText)||'').trim();
    var cmp=0;
    if(type==='num') cmp=numFrom(av)-numFrom(bv);
    else cmp=av.localeCompare(bv,'pt-BR',{numeric:true,sensitivity:'base'});
    return asc?cmp:-cmp;
  });
  rows.forEach(function(r){ tb.appendChild(r); });
  tbl.setAttribute('data-sort-col',String(colIdx));
  tbl.setAttribute('data-sort-dir',asc?'asc':'desc');
}

/* =========================================================
   10.5) FILTROS LOCAIS COMPARTILHADOS
   ---------------------------------------------------------
   Aplicados client-side no Raio-X e na Carteira Inteligente.
   Evita round-trip ao GAS para cada ajuste de filtro.
   ========================================================= */

/*
  lfBucket(dsm)
  ----------------------------------------------------------
  Classifica dias sem postar em um dos 3 buckets de período.
*/
function lfBucket(dsm){
  var n=+dsm||0;
  if(n<=30)return 'ate30';
  if(n<=60)return 'a60';
  return 'mais60';
}

/*
  lfNormPr(p)
  ----------------------------------------------------------
  Normaliza prioridade nos 4 buckets: CRÍTICA, ALTA, MÉDIA, BAIXA.
*/
function lfNormPr(p){
  var v=String(p||'').toUpperCase().trim();
  if(v==='CRITICA'||v==='CRÍTICA')return 'CRÍTICA';
  if(v==='ALTA')return 'ALTA';
  if(v==='MEDIA'||v==='MÉDIA')return 'MÉDIA';
  return 'BAIXA';
}

function lfExternalFiltersFromUrl(){
  try{
    var q=new URLSearchParams(location.search);
    S.localF.externalLocal=String(q.get('local')||'').trim().toUpperCase();
    S.localF.externalCurve=String(q.get('curva')||'').trim().toUpperCase();
  }catch(e){ S.localF.externalLocal=''; S.localF.externalCurve=''; }
}
function lfMatchesExternal(r){
  var local=String((r&&r.local)||'').trim().toUpperCase();
  var curva=String((r&&r.curva)||'').trim().toUpperCase();
  if(S.localF.externalLocal&&local!==S.localF.externalLocal)return false;
  if(S.localF.externalCurve&&curva!==S.localF.externalCurve)return false;
  return true;
}

/*
  lfApply(rows)
  ----------------------------------------------------------
  Filtra um array de linhas pelos filtros locais ativos
  (ação + prioridade + bucket de última postagem).
*/
function lfApply(rows){
  if(!rows||!rows.length)return rows||[];
  var acSet=S.localF.ac, prSet=S.localF.pr, bkSet=S.localF.dsmBucket;
  var hasAc=acSet&&acSet.size>0;
  var hasPr=prSet&&prSet.size>0;
  var hasBk=bkSet&&bkSet.size>0;
  var onlyNovo=!!S.localF.novoOnly;
  if(!hasAc&&!hasPr&&!hasBk&&!onlyNovo&&!S.localF.externalLocal&&!S.localF.externalCurve)return rows;
  return rows.filter(function(r){
    if(!lfMatchesExternal(r))return false;
    if(hasAc&&!acSet.has(String(r.ac||'').toUpperCase()))return false;
    if(hasPr&&!prSet.has(lfNormPr(r.pr)))return false;
    if(hasBk&&!bkSet.has(lfBucket(r.dsm)))return false;
    if(onlyNovo&&!r.isNovo)return false;
    return true;
  });
}

/*
  lfCount(rows, ac)
  ----------------------------------------------------------
  Conta quantas linhas caem em uma determinada ação, já
  respeitando os demais filtros ativos (prioridade + bucket).
*/
function lfCount(rows,ac){
  var bkSet=S.localF.dsmBucket,hasBk=bkSet&&bkSet.size>0;
  var prSet=S.localF.pr,hasPr=prSet&&prSet.size>0;
  var onlyNovo=!!S.localF.novoOnly;
  var n=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!lfMatchesExternal(r))continue;
    if(ac!=='TODOS'&&String(r.ac||'').toUpperCase()!==ac)continue;
    if(hasPr&&!prSet.has(lfNormPr(r.pr)))continue;
    if(hasBk&&!bkSet.has(lfBucket(r.dsm)))continue;
    if(onlyNovo&&!r.isNovo)continue;
    n++;
  }
  return n;
}

/*
  lfCountBucket(rows, bk)
  ----------------------------------------------------------
  Conta linhas em um bucket, respeitando os filtros de ação
  e prioridade ativos.
*/
function lfCountBucket(rows,bk){
  var acSet=S.localF.ac,hasAc=acSet&&acSet.size>0;
  var prSet=S.localF.pr,hasPr=prSet&&prSet.size>0;
  var onlyNovo=!!S.localF.novoOnly;
  var n=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!lfMatchesExternal(r))continue;
    if(hasAc&&!acSet.has(String(r.ac||'').toUpperCase()))continue;
    if(hasPr&&!prSet.has(lfNormPr(r.pr)))continue;
    if(onlyNovo&&!r.isNovo)continue;
    if(!bk){n++;continue}
    if(lfBucket(r.dsm)===bk)n++;
  }
  return n;
}

/*
  lfCountPr(rows, pr)
  ----------------------------------------------------------
  Conta linhas em uma prioridade (ALTA/MÉDIA/BAIXA ou TODOS),
  respeitando os filtros de ação e bucket.
*/
function lfCountPr(rows,pr){
  var acSet=S.localF.ac,hasAc=acSet&&acSet.size>0;
  var bkSet=S.localF.dsmBucket,hasBk=bkSet&&bkSet.size>0;
  var onlyNovo=!!S.localF.novoOnly;
  var n=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!lfMatchesExternal(r))continue;
    if(hasAc&&!acSet.has(String(r.ac||'').toUpperCase()))continue;
    if(pr!=='TODOS'&&lfNormPr(r.pr)!==pr)continue;
    if(hasBk&&!bkSet.has(lfBucket(r.dsm)))continue;
    if(onlyNovo&&!r.isNovo)continue;
    n++;
  }
  return n;
}

function lfCountNovo(rows){
  var acSet=S.localF.ac,hasAc=acSet&&acSet.size>0;
  var prSet=S.localF.pr,hasPr=prSet&&prSet.size>0;
  var bkSet=S.localF.dsmBucket,hasBk=bkSet&&bkSet.size>0;
  var n=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!lfMatchesExternal(r))continue;
    if(hasAc&&!acSet.has(String(r.ac||'').toUpperCase()))continue;
    if(hasPr&&!prSet.has(lfNormPr(r.pr)))continue;
    if(hasBk&&!bkSet.has(lfBucket(r.dsm)))continue;
    if(r.isNovo)n++;
  }
  return n;
}

/*
  lfBar(scope, rows)
  ----------------------------------------------------------
  Monta HTML da barra de filtros locais compartilhada.
  scope = 'cl' (Raio-X) ou 'ac' (Carteira)
*/
function lfBar(scope,rows){
  var acs=['TODOS','RESGATAR','CONVERTER','FIDELIZAR','MANTER','CANCELAR'];
  var prs=['TODOS','CRÍTICA','ALTA','MÉDIA','BAIXA'];
  var bks=[
    {k:'',lb:'Todos'},
    {k:'ate30',lb:'≤ 30d'},
    {k:'a60',lb:'31–60d'},
    {k:'mais60',lb:'> 60d'}
  ];
  var acSet=S.localF.ac,hasAc=acSet&&acSet.size>0;
  var prSet=S.localF.pr,hasPr=prSet&&prSet.size>0;

  var acChips=acs.map(function(a){
    var on=(a==='TODOS'&&!hasAc)||(a!=='TODOS'&&acSet.has(a));
    var cnt=lfCount(rows,a);
    return '<button class="lf-chip'+(on?' on':'')+'" data-lf-ac="'+a+'" data-scope="'+scope+'">'+
             a+' <span class="cnt">'+N(cnt)+'</span>'+
           '</button>';
  }).join('');

  var prChips=prs.map(function(p){
    var on=(p==='TODOS'&&!hasPr)||(p!=='TODOS'&&prSet.has(p));
    var cnt=lfCountPr(rows,p);
    return '<button class="lf-chip'+(on?' on':'')+'" data-lf-pr="'+p+'" data-scope="'+scope+'">'+
             p+' <span class="cnt">'+N(cnt)+'</span>'+
           '</button>';
  }).join('');

  var bkChips=bks.map(function(b){
    var hasBkSet=S.localF.dsmBucket&&S.localF.dsmBucket.size>0;
    var on=(b.k===''&&!hasBkSet)||(b.k!==''&&S.localF.dsmBucket.has(b.k));
    var cnt=lfCountBucket(rows,b.k);
    return '<button class="lf-chip'+(on?' on':'')+'" data-lf-bk="'+b.k+'" data-scope="'+scope+'">'+
             b.lb+' <span class="cnt">'+N(cnt)+'</span>'+
           '</button>';
  }).join('');

  var novoCnt=lfCountNovo(rows);
  var novoChip='<button class="lf-chip'+(S.localF.novoOnly?' on':'')+'" data-lf-nv="1" data-scope="'+scope+'">NOVO <span class="cnt">'+N(novoCnt)+'</span></button>';

  return '<div class="lf-wrap print-hidden">'+
           '<div class="lf-row"><span class="lf-lb">Ação</span>'+acChips+'</div>'+
           '<div class="lf-row"><span class="lf-lb">Prioridade</span>'+prChips+'</div>'+
           '<div class="lf-row"><span class="lf-lb">Última postagem</span>'+bkChips+novoChip+'</div>'+
         '</div>';
}

/*
  pgBar(scope, total, pageSize, curPage)
  ----------------------------------------------------------
  Monta HTML dos controles de paginação.
*/
function pgBar(scope,total,pageSize,curPage){
  var pages=Math.max(1,Math.ceil(total/pageSize));
  var cur=Math.min(Math.max(1,curPage),pages);
  var fromN=total===0?0:((cur-1)*pageSize+1);
  var toN=Math.min(cur*pageSize,total);
  var sizes=[50,100,200,500,1000];
  var sizeOpts=sizes.map(function(n){
    return '<option value="'+n+'"'+(n===pageSize?' selected':'')+'>'+n+'/pg</option>';
  }).join('');
  return '<div class="pg-ctrl print-hidden" data-scope="'+scope+'">'+
           '<div class="pg-info">'+N(fromN)+'–'+N(toN)+' de '+N(total)+'</div>'+
           '<div class="pg-btns">'+
             '<button data-pg="first" data-scope="'+scope+'"'+(cur<=1?' disabled':'')+'>«</button>'+
             '<button data-pg="prev" data-scope="'+scope+'"'+(cur<=1?' disabled':'')+'>‹</button>'+
             '<span style="padding:0 8px;font-weight:700;color:var(--nv)">'+cur+' / '+pages+'</span>'+
             '<button data-pg="next" data-scope="'+scope+'"'+(cur>=pages?' disabled':'')+'>›</button>'+
             '<button data-pg="last" data-scope="'+scope+'"'+(cur>=pages?' disabled':'')+'>»</button>'+
             '<select data-pgsize="'+scope+'">'+sizeOpts+'</select>'+
           '</div>'+
         '</div>';
}

/*
  lfWire(scope, rerenderFn)
  ----------------------------------------------------------
  Liga os event handlers dos chips e controles de paginação
  ao render passado.
*/
function lfWire(scope,rerenderFn){
  /* chips de ação (multi-select, TODOS limpa) */
  document.querySelectorAll('.lf-chip[data-lf-ac][data-scope="'+scope+'"]').forEach(function(b){
    b.addEventListener('click',function(){
      var a=b.getAttribute('data-lf-ac');
      if(a==='TODOS'){
        S.localF.ac.clear();
      }else{
        if(S.localF.ac.has(a))S.localF.ac.delete(a);
        else S.localF.ac.add(a);
      }
      /* reset de página ao mudar filtro */
      S.localF.pageCl=1;S.localF.pageAc=1;
      rerenderFn();
    });
  });
  /* chips de prioridade (v10.4, multi-select, TODOS limpa) */
  document.querySelectorAll('.lf-chip[data-lf-pr][data-scope="'+scope+'"]').forEach(function(b){
    b.addEventListener('click',function(){
      var p=b.getAttribute('data-lf-pr');
      if(p==='TODOS'){
        S.localF.pr.clear();
      }else{
        if(S.localF.pr.has(p))S.localF.pr.delete(p);
        else S.localF.pr.add(p);
      }
      S.localF.pageCl=1;S.localF.pageAc=1;
      rerenderFn();
    });
  });
  /* chips de bucket de período */
  document.querySelectorAll('.lf-chip[data-lf-bk][data-scope="'+scope+'"]').forEach(function(b){
    b.addEventListener('click',function(){
      var k=b.getAttribute('data-lf-bk')||'';
      if(k===''){
        S.localF.dsmBucket.clear();
      }else{
        if(S.localF.dsmBucket.has(k))S.localF.dsmBucket.delete(k);
        else S.localF.dsmBucket.add(k);
      }
      S.localF.pageCl=1;S.localF.pageAc=1;
      rerenderFn();
    });
  });
  /* chip NOVO */
  document.querySelectorAll('.lf-chip[data-lf-nv][data-scope="'+scope+'"]').forEach(function(b){
    b.addEventListener('click',function(){
      S.localF.novoOnly=!S.localF.novoOnly;
      S.localF.pageCl=1;S.localF.pageAc=1;
      rerenderFn();
    });
  });
  /* paginação */
  document.querySelectorAll('.pg-ctrl[data-scope="'+scope+'"] button[data-pg]').forEach(function(b){
    b.addEventListener('click',function(){
      var dir=b.getAttribute('data-pg');
      var key=scope==='cl'?'pageCl':'pageAc';
      var sizeKey=scope==='cl'?'pgSizeCl':'pgSizeAc';
      /* o total vem do rerender; usamos Number.MAX como sentinela "last" */
      if(dir==='first')S.localF[key]=1;
      else if(dir==='prev')S.localF[key]=Math.max(1,S.localF[key]-1);
      else if(dir==='next')S.localF[key]=S.localF[key]+1;
      else if(dir==='last')S.localF[key]=999999;
      rerenderFn();
    });
  });
  /* tamanho da página */
  document.querySelectorAll('select[data-pgsize="'+scope+'"]').forEach(function(sel){
    sel.addEventListener('change',function(){
      var sizeKey=scope==='cl'?'pgSizeCl':'pgSizeAc';
      var key=scope==='cl'?'pageCl':'pageAc';
      S.localF[sizeKey]=+sel.value||100;
      S.localF[key]=1;
      rerenderFn();
    });
  });
}

/* =========================================================
   11) RENDER DA VIEW: CLIENTES / RAIO-X
   ========================================================= */
function rCl(){
  var mx=S.pl.mx;

  if(!mx){
    $('v-cl').innerHTML='<div class="bx">Sem dados.</div>';
    return;
  }

  var ms=mx.ms||[],
      rowsAll=mx.rows||[];

  /* Aplica filtros locais (ação + bucket de última postagem) */
  var rowsFiltered=lfApply(rowsAll);

  /* Paginação client-side */
  var total=rowsFiltered.length;
  var pgSize=S.localF.pgSizeCl||100;
  var totalPages=Math.max(1,Math.ceil(total/pgSize));
  if(S.localF.pageCl>totalPages)S.localF.pageCl=totalPages;
  if(S.localF.pageCl<1)S.localF.pageCl=1;
  var from=(S.localF.pageCl-1)*pgSize;
  var rowsPg=rowsFiltered.slice(from,from+pgSize);

  function hX(label,idx,type){
    return '<th onclick="sortTbl(\'xTbl\','+idx+',\''+type+'\')">'+label+' <span class="sa">⇅</span></th>';
  }

  var hdr=hX('Cliente',0,'str')+
    hX('Último',1,'num')+
    ms.map(function(ym,i){
      var p=ym.split('-');
      return hX(p[1]+'/'+p[0].slice(2),i+2,'num');
    }).join('')+
    hX('Total',ms.length+2,'num')+
    hX('Fat.',ms.length+3,'num')+
    hX('Ticket',ms.length+4,'num')+
    hX('Contrato',ms.length+5,'str')+
    hX('Ação',ms.length+6,'str');

  var body=rowsPg.map(function(r){
    var novoTag=r.isNovo?nB(true):'';
    var cl='<td title="'+E(r.nome)+'"><div class="cli-cell"><span class="cli-nm">'+E(r.nome)+'</span>'+novoTag+'</div></td><td class="nwr">'+Fd(r.dsm)+'</td>';

    r.md.forEach(function(m){
      var cs='m-sm',tx='—';

      if(m.st==='ATUAL'){cs='m-at';tx=String(m.q);}
      else if(m.st==='ATIVO'||m.st==='ESTAVEL'){cs='m-es';tx=String(m.q);}
      else if(m.st==='ALTA'){cs='m-al';tx='▲'+m.q;}
      else if(m.st==='QUEDA'){cs='m-qu';tx='▼'+m.q;}
      else if(m.st==='INATIVO'){cs='m-in';tx='✕';}

      cl+='<td class="'+cs+' nwr">'+tx+'</td>';
    });

    cl+='<td class="nwr"><strong>'+N(r.tQ)+'</strong></td>'+
        '<td class="nwr">'+M(r.tV)+'</td>'+
        '<td class="nwr">'+M(r.tk)+'</td>'+
        '<td class="nwr">'+cB(r.etq==="COM")+'</td>'+
        '<td class="nwr">'+aB(r.ac)+'</td>';

    return '<tr>'+cl+'</tr>';
  }).join('');

  $('v-cl').innerHTML=
    '<div class="bx"><div class="bx-t"><span>Raio-X de Clientes — mês a mês</span><span class="bx-sub">'+N(total)+' de '+N(mx.totCli)+' clientes</span></div>'+
      lfBar('cl',rowsAll)+
      '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;font-size:9px">'+
        '<span class="bg b-ok">▲ Crescendo</span>'+
        '<span class="bg b-bl">Estável</span>'+
        '<span class="bg b-dn">▼ Caindo</span>'+
        '<span class="bg" style="background:#e74c3c;color:#fff">✕ Não postou</span>'+
        '<span class="bg b-mt">— Sem dados</span>'+
        '<span class="bg" style="background:var(--blp);color:var(--bl)">Mês atual</span>'+
      '</div>'+
      '<div class="mw"><table id="xTbl"><thead><tr>'+hdr+'</tr></thead><tbody>'+
        (body||'<tr><td colspan="'+(ms.length+7)+'" style="color:var(--mt);text-align:center;padding:12px">Nenhum cliente com esses filtros.</td></tr>')+
      '</tbody></table></div>'+
      pgBar('cl',total,pgSize,S.localF.pageCl)+
    '</div>';

  /* Liga handlers dos filtros e paginação */
  lfWire('cl',rCl);
}

/* =========================================================
   12) RENDER DA VIEW: AÇÕES
   ========================================================= */
function rAc(){
  var d=S.pl.acoes,
      cli=S.pl.cli,
      mx=S.pl.mx;

  if(!d||!cli){
    $('v-ac').innerHTML='';
    return;
  }

  var sm=d.sum||[],
      foco=d.foco||[],
      ctAll=cli.ct||[],
      cSm=cli.sum||{};

  var totBase=mx?mx.totCli:0;

  /* Aplica filtros locais unificados */
  var ctFiltered=lfApply(ctAll);
  var total=ctFiltered.length;
  var filteredSum={
    tot:total,
    nConv:ctFiltered.filter(function(x){return String(x.ac||'').toUpperCase()==='CONVERTER';}).length,
    nFid:ctFiltered.filter(function(x){return String(x.ac||'').toUpperCase()==='FIDELIZAR';}).length,
    nResg:ctFiltered.filter(function(x){return String(x.ac||'').toUpperCase()==='RESGATAR';}).length,
    nCanc:ctFiltered.filter(function(x){return String(x.ac||'').toUpperCase()==='CANCELAR';}).length
  };
  var nManter=(filteredSum.tot||0)-(filteredSum.nConv||0)-(filteredSum.nFid||0)-(filteredSum.nResg||0)-(filteredSum.nCanc||0);
  sm=[
    {label:'CONVERTER',value:filteredSum.nConv},
    {label:'FIDELIZAR',value:filteredSum.nFid},
    {label:'MANTER',value:nManter},
    {label:'RESGATAR',value:filteredSum.nResg},
    {label:'CANCELAR',value:filteredSum.nCanc}
  ].filter(function(x){return x.value>0;});
  var baseTotal=(mx&&mx.totCli)?mx.totCli:((cSm&&cSm.baseTotal)?cSm.baseTotal:ctAll.length);
  var pgSize=S.localF.pgSizeAc||50;
  var totalPages=Math.max(1,Math.ceil(total/pgSize));
  if(S.localF.pageAc>totalPages)S.localF.pageAc=totalPages;
  if(S.localF.pageAc<1)S.localF.pageAc=1;
  var from=(S.localF.pageAc-1)*pgSize;
  var ctPg=ctFiltered.slice(from,from+pgSize);

  /* Helper: trunca intermediador para não quebrar linha */
  function trIn(s){
    var v=String(s||'—');
    if(v.length>22)v=v.slice(0,20)+'…';
    return v;
  }

  /* Métricas da Carteira: sempre calculadas pelo período/filtros globais. */
  function fatPer(r){ return r&&r.fW!=null ? (+r.fW||0) : 0; }
  function qtdPer(r){ return r&&r.qW!=null ? (+r.qW||0) : 0; }
  function ticketPer(r){ var q=qtdPer(r), f=fatPer(r); return q>0 ? f/q : 0; }

  $('v-ac').innerHTML=
    '<div class="g g6 ac-kpi-grid">'+
      K({t:'Clientes no período',v:N(total),n:'de '+N(baseTotal)+' da base',cls:'ac-total'})+
      K({t:'Converter',v:N(filteredSum.nConv),n:'Migração/contrato',s:'conv'})+
      K({t:'Fidelizar',v:N(filteredSum.nFid),n:'Relacionamento',s:'fid'})+
      K({t:'Manter',v:N(nManter),n:'Monitorar',s:'man'})+
      K({t:'Resgatar',v:N(filteredSum.nResg),n:'Inativos 30+d',s:'resg'})+
      K({t:'Cancelar',v:N(filteredSum.nCanc),n:'Sem etiqueta',s:'canc'})+
    '</div>'+

    '<div class="g g2" style="margin-top:8px">'+
      '<div class="bx"><div class="bx-t">Resumo por tipo de ação</div>'+
        (sm.length
          ?'<table><thead><tr><th onclick="sortTbl(\'cTbl\',1,\'str\')">Ação <span class="sa">⇅</span></th><th>Qtd</th></tr></thead><tbody>'+
            sm.map(function(x){
              return '<tr><td>'+aB(x.label)+'</td><td>'+N(x.value)+'</td></tr>';
            }).join('')+
           '</tbody></table>'
          :''
        )+
      '</div>'+

      '<div class="bx"><div class="bx-t"><span class="mi">track_changes</span> Foco de negócio</div>'+
        (foco.length
          ?'<div style="display:flex;flex-direction:column;gap:5px">'+
            foco.map(function(t){
              return '<div class="call" style="padding:8px"><div style="font-size:11px;font-weight:700;line-height:1.4">'+E(t)+'</div></div>';
            }).join('')+
           '</div>'
          :''
        )+
      '</div>'+
    '</div>'+

    '<div class="bx" style="margin-top:8px"><div class="bx-t">'+
        '<span>Carteira inteligente</span>'+
        '<span class="bx-sub">'+N(total)+' de '+N(baseTotal)+' da base</span>'+
      '</div>'+
      lfBar('ac',ctAll)+

      '<div class="tw ac-wallet-wrap"><table id="cTbl" class="ac-wallet-table"><thead><tr>'+
        '<th onclick="sortTbl(\'cTbl\',0,\'str\')">Cliente <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',1,\'str\')">Ação <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',2,\'str\')">Prior. <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',3,\'str\')">Status <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',4,\'str\')">Contr. <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',5,\'str\')">Intermediador <span class="sa">⇅</span></th>'+
        '<th class="tk-hl" onclick="sortTbl(\'cTbl\',6,\'num\')">Ticket <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',7,\'num\')">Qtd <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',8,\'num\')">Fat. <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',9,\'num\')">Δ Fat <span class="sa">⇅</span></th>'+
        '<th onclick="sortTbl(\'cTbl\',10,\'num\')">Último <span class="sa">⇅</span></th>'+
      '</tr></thead><tbody>'+

      (ctPg.length
        ?ctPg.map(function(r){
          var novoTag=r.isNovo?nB(true):'';
          return '<tr data-a="'+E(r.ac)+'">'+
            '<td title="'+E(r.nome)+'"><div class="cli-cell"><span class="cli-nm">'+E(r.nome)+'</span>'+novoTag+'</div></td>'+
            '<td class="nwr">'+aB(r.ac)+'</td>'+
            '<td class="nwr">'+pB(r.pr)+'</td>'+
            '<td class="nwr">'+bS(r.st)+'</td>'+
            '<td class="nwr">'+cB(r.etq)+'</td>'+
            '<td class="nwr" style="font-size:11px" title="'+E(r.intermediador||'')+'">'+E(trIn(r.intermediador))+'</td>'+
            '<td class="tk-hl nwr">'+M(ticketPer(r))+'</td>'+
            '<td class="nwr">'+N(qtdPer(r))+'</td>'+
            '<td class="nwr">'+M(fatPer(r))+'</td>'+
            '<td class="nwr">'+dH(r.fdPct)+'</td>'+
            '<td class="nwr">'+Fd(r.dsm)+'</td>'+
          '</tr>';
        }).join('')
        :'<tr><td colspan="11" style="color:var(--mt);text-align:center;padding:12px">Nenhum cliente com esses filtros.</td></tr>'
      )+

      '</tbody></table></div>'+
      pgBar('ac',total,pgSize,S.localF.pageAc)+
    '</div>';

  /* Liga handlers dos filtros e paginação */
  lfWire('ac',rAc);
}

/* =========================================================
   13) ABAS
   ========================================================= */
function aT(v){
  document.querySelectorAll('.tab').forEach(function(b){
    b.classList.toggle('on',b.dataset.v===v);
  });

  document.querySelectorAll('.vw').forEach(function(el){
    el.classList.toggle('on',el.id==='v-'+v);
  });
}

document.querySelectorAll('.tab').forEach(function(b){
  b.addEventListener('click',function(){
    aT(b.dataset.v);
  });
});

/* =========================================================
   14) LOAD PRINCIPAL
   ---------------------------------------------------------
   ld(ex) é a função central do dashboard.
   Ela:
   1. lê filtros
   2. chama a API
   3. atualiza UI
   4. renderiza todas as views
   ========================================================= */
async function ld(ex){
  $('sE').style.display='none';

  /* lê filtros da interface */
  rF();

  /* monta parâmetros */
  var p=Object.assign({
    periodMode:S.f.pm || 'month',
    monthYm:S.f.ym,
    startDate:S.f.sd,
    endDate:S.f.ed,
    day:S.f.ed,
    unit:S.f.u,
    type:S.f.t,
    inter:S.f.i,
    seg:S.f.s,
    q:S.f.q
  },ex||{});

  sL();

  try{
    var pl=await api(p);

    S.pl=pl;

    /* v10.2: reset da paginação ao carregar novo payload
       (filtros locais de ação/período persistem — por design) */
    S.localF.pageCl=1;
    S.localF.pageAc=1;

    apUI(pl);
    rCh(pl);
    rCx(pl);

    /* renderiza todas as telas */
    rOv();
    rDy();
    rOp();
    rCl();
    rAc();

  }catch(e){
    sEr(e.message||String(e));
  }finally{
    hL();
  }
}

   15) EVENTOS

/*
  mudar mês
  ----------------------------------------------------------
  Quando troca o mês:
  - salva no estado
  - limpa datas
  - recarrega
*/
function syncDashSearchUi(){ var w=document.getElementById('dashSearchWrap'); if(w) w.classList.toggle('has-value', !!(($('fQ').value||'').trim())); }
function dashSuggestionNames(){ var rows=((S.pl&&S.pl.mx&&S.pl.mx.rows)||[]); return Array.from(new Set(rows.map(function(r){ return r.nome; }).filter(Boolean))); }
function setupDashSearchBox(){ var input=$('fQ'), sug=$('dashSearchSuggest'), wrap=$('dashSearchWrap'); if(!input||!sug||!wrap||input.dataset.bound==='1') return; input.dataset.bound='1'; var norm=function(v){ try{return String(v||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();}catch(e){return String(v||'').toLowerCase().trim();} }; var render=function(){ var q=norm(input.value); syncDashSearchUi(); if(!q){ sug.innerHTML=''; wrap.classList.remove('show-suggest'); return; } var items=dashSuggestionNames().filter(function(v){ return norm(v).startsWith(q); }).slice(0,8); sug.innerHTML=items.map(function(v){ return '<button type="button" data-pick="'+E(v)+'">'+E(v)+'</button>'; }).join(''); wrap.classList.toggle('show-suggest', items.length>0); sug.querySelectorAll('[data-pick]').forEach(function(b){ b.onclick=function(){ input.value=b.dataset.pick; wrap.classList.add('has-value'); wrap.classList.remove('show-suggest'); }; }); }; input.addEventListener('input', render); input.addEventListener('keyup', render); input.addEventListener('focus', render); document.addEventListener('click', function(e){ if(!e.target.closest('#dashSearchWrap')) wrap.classList.remove('show-suggest'); if(!e.target.closest('.ms')) document.querySelectorAll('.ms').forEach(function(x){ x.classList.remove('open'); }); }); }
function printDashMeta(){ var filtros=[]; if(S.f.sd&&S.f.ed) filtros.push(S.f.sd+' → '+S.f.ed); [['LOCAL',S.f.u],['TIPO',S.f.t],['INTERMEDIÁRIO',S.f.i],['SEGMENTO',S.f.s]].forEach(function(p){ if(p[1]) filtros.push(p[0]+': '+p[1]); }); if(S.f.q) filtros.push('Cliente: '+S.f.q); document.getElementById('printMetaDash').textContent=filtros.join(' • '); var period=(S.f.sd&&S.f.ed)?(S.f.sd===S.f.ed?S.f.sd:S.f.sd+'_'+S.f.ed):(S.f.ym||'periodo'); var tab=document.querySelector('.tab.on')?document.querySelector('.tab.on').textContent.trim():'Dashboard'; document.title=(period+'_'+tab+'_Dashboard.pdf').replace(/\//g,'-').replace(/\s+/g,'_'); }
Array.from(document.querySelectorAll('[data-pm]')).forEach(function(btn){
  btn.addEventListener('click', async function(){
    S.f.pm=btn.dataset.pm;
    renderPeriodUi();
    applyPeriodFromUi();
    renderPeriodUi();
    await ld();
  });
});
$('pPrev').addEventListener('click', async function(){
  var latest=S.bounds.latest||new Date().toISOString().slice(0,10);
  if(S.f.pm==='day'){
    var v=shiftDays($('pDay').value||latest,-1);
    $('pDay').value=v;
    S.f.anchor=v;
  } else if(S.f.pm==='week'){
    var v=shiftDays($('pWeek').value||latest,-7);
    $('pWeek').value=v;
    S.f.anchor=v;
  } else if(S.f.pm==='month'){
    var v=shiftMonth($('pMonth').value||latest.slice(0,7),-1);
    $('pMonth').value=v;
    S.f.ym=v;
  }
  applyPeriodFromUi();
  renderPeriodUi();
  await ld();
});
$('pNext').addEventListener('click', async function(){
  var latest=S.bounds.latest||new Date().toISOString().slice(0,10);
  if(S.f.pm==='day'){
    var v=shiftDays($('pDay').value||latest,1);
    $('pDay').value=v;
    S.f.anchor=v;
  } else if(S.f.pm==='week'){
    var v=shiftDays($('pWeek').value||latest,7);
    $('pWeek').value=v;
    S.f.anchor=v;
  } else if(S.f.pm==='month'){
    var v=shiftMonth($('pMonth').value||latest.slice(0,7),1);
    $('pMonth').value=v;
    S.f.ym=v;
  }
  applyPeriodFromUi();
  renderPeriodUi();
  await ld();
});
/* pToday removed — navigation via arrows only */
['pDay','pWeek','pMonth','pStart','pEnd'].forEach(function(id){
  var el=$(id);
  if(!el)return;
  el.addEventListener('change', async function(){
    applyPeriodFromUi();
    renderPeriodUi();
    await ld();
  });
});
$('aBtn').addEventListener('click',async function(){ await ld(); });
$('clearFiltersBtn').addEventListener('click', async function(){ resetDashFilters(); await ld(); });
document.getElementById('dashClearBtn').addEventListener('click', function(){ $('fQ').value=''; syncDashSearchUi(); $('dashSearchWrap').classList.remove('show-suggest'); });
$('fQ').addEventListener('input', syncDashSearchUi);
document.getElementById('btnPrintDash').addEventListener('click', function(){
  printDashMeta();
  /* v10.2: preparar impressão
     - Aba Clientes/Ações → paisagem (muitas colunas)
     - Renderizar TODAS as linhas (bypass de paginação)
     - Desabilitar filtros locais para não cortar dados inadvertidamente */
  var activeTab=document.querySelector('.tab.on');
  var tabV=activeTab?activeTab.getAttribute('data-v'):'';
  var needLandscape=(tabV==='cl'||tabV==='ac');

  /* Salva estado de paginação */
  var savedPgCl=S.localF.pgSizeCl;
  var savedPgAc=S.localF.pgSizeAc;
  var savedPageCl=S.localF.pageCl;
  var savedPageAc=S.localF.pageAc;

  /* Amplia para caber tudo na impressão (valor > total possível) */
  S.localF.pgSizeCl=999999;
  S.localF.pgSizeAc=999999;
  S.localF.pageCl=1;
  S.localF.pageAc=1;

  /* Re-renderiza a view ativa com tudo visível */
  if(tabV==='cl')rCl();
  else if(tabV==='ac')rAc();

  /* Injeta @page landscape quando necessário */
  var pgStyle=null;
  if(needLandscape){
    pgStyle=document.createElement('style');
    pgStyle.id='__print_page__';
    pgStyle.textContent='@media print{@page{size:A4 landscape;margin:8mm 6mm}}';
    document.head.appendChild(pgStyle);
  }

  /* Imprime e restaura estado depois */
  setTimeout(function(){
    window.print();
    /* cleanup (desktop browsers disparam afterprint, mas garantimos aqui) */
    setTimeout(function(){
      if(pgStyle&&pgStyle.parentNode)pgStyle.parentNode.removeChild(pgStyle);
      S.localF.pgSizeCl=savedPgCl;
      S.localF.pgSizeAc=savedPgAc;
      S.localF.pageCl=savedPageCl;
      S.localF.pageAc=savedPageAc;
      if(tabV==='cl')rCl();
      else if(tabV==='ac')rAc();
    },300);
  },120);
});
window.addEventListener('beforeprint', printDashMeta);
document.getElementById('rfBtn2').addEventListener('click',async function(){await ld();});
lfExternalFiltersFromUrl();
aT('cl');
ld();
