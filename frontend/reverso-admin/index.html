  <link rel="icon" href="./assets/favicon.ico">

  <link rel="stylesheet" href="./styles/internal.css?v=20260615-reverso-v164">
  <script src="/shared/auth/agf-auth-config.js"></script>
  <script src="/shared/auth/agf-auth-client.js"></script>
  <script>window.AGF_ACCESS={roles:['admin','manager','user'],app:'reverso-admin'};</script>
  <script src="/shared/auth/agf-route-guard.js"></script>
</head>
<body>
  <div class="toast" id="toast" aria-live="polite"></div>
  <div class="loading" id="loading" aria-hidden="true"><div class="loading-card"><div class="spinner"></div><div id="loadingText">Carregando...</div></div></div>
  <header class="portal-topbar internal-topbar">
    <div class="portal-topbar-inner">
      <a class="portal-brand" href="/agf/"><span class="agf-brand-tile"><span class="material-symbols-rounded">assignment_return</span></span><span class="portal-brand-copy"><strong>Admin Logística Reversa</strong><small>AGF JOSÉ BONIFÁCIO</small></span></a>
      <div class="portal-top-actions"><span class="user-pill" id="internalUserPill"><span class="material-symbols-rounded">person</span><span id="internalUserName">Usuário</span></span><a class="agf-icon-button" href="/agf/"><span class="material-symbols-rounded">apps</span><span>Portal</span></a><button class="agf-icon-button" id="logoutButton" type="button"><span class="material-symbols-rounded">logout</span><span>Sair</span></button></div>
    </div>
  </header>
  <main class="internal-main admin-shell">
    <section class="section-head internal-head"><div><h1 class="section-title">Painel administrativo</h1><p class="section-subtitle">Gestão de unidades, lotes, etiquetas, objetos, coletas, expedição e divergências.</p></div><div class="head-reference"><span id="todayReference" class="today-reference"></span><button class="btn btn-ghost btn-sm" id="btnRefresh"><span class="material-symbols-rounded">refresh</span>Atualizar</button></div></section>
    <nav class="admin-tabs" id="adminTabs" aria-label="Navegação Admin Reverso">
      <button class="admin-tab is-active" data-tab="dashboard"><span class="material-symbols-rounded">dashboard</span>Dashboard</button>
      <button class="admin-tab" data-tab="unidades"><span class="material-symbols-rounded">apartment</span>Unidades</button>
      <button class="admin-tab" data-tab="etiquetas"><span class="material-symbols-rounded">qr_code_2</span>Etiquetas</button>
      <button class="admin-tab" data-tab="objetos"><span class="material-symbols-rounded">package_2</span>Objetos</button>
      <button class="admin-tab" data-tab="coletas"><span class="material-symbols-rounded">local_shipping</span>Coletas</button>
      <button class="admin-tab" data-tab="expedicao"><span class="material-symbols-rounded">outbox</span>Expedição</button>
      <button class="admin-tab" data-tab="divergencias"><span class="material-symbols-rounded">report</span>Divergências</button>
      <button class="admin-tab" data-tab="config"><span class="material-symbols-rounded">settings</span>Configurações</button>
    </nav>
    <section id="screenMount" class="admin-mount"></section>
  </main>
  <script type="module" src="./js/app.js?v=20260615-reverso-v164"></script>
