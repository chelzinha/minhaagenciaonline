<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
  <meta name="theme-color" content="#00416B">
  <title>Atendimento — AGF José Bonifácio</title>
  <link rel="preconnect" href="https://script.google.com"><link rel="preconnect" href="https://script.googleusercontent.com">
  <link rel="manifest" href="/atende/manifest.webmanifest">
  <link rel="stylesheet" href="/shared/ui/agf-ui.css">
  <script src="/shared/auth/agf-auth-config.js"></script><script src="/shared/auth/agf-auth-client.js"></script><script>window.AGF_ACCESS={roles:["admin", "manager", "user"],app:"atende"};</script><script src="/shared/auth/agf-route-guard.js"></script>
</head>
<body>
  <div class="agf-frame-layout agf-embed-only">
    <iframe id="atendeFrame" src="https://script.google.com/macros/s/AKfycbwCBAG4gBVHMHh7cHgnIG215RL8m8CbymvsAaHcs4bXhp0RCyPeP_cr6IA5iZtsch_m1g/exec" data-agf-frame-src="https://script.google.com/macros/s/AKfycbwCBAG4gBVHMHh7cHgnIG215RL8m8CbymvsAaHcs4bXhp0RCyPeP_cr6IA5iZtsch_m1g/exec" title="Atendimento" loading="eager" referrerpolicy="strict-origin-when-cross-origin" allow="clipboard-read; clipboard-write"></iframe>
  </div>

  <script>
    (function(){
      var frame=document.getElementById('atendeFrame');
      if(!frame)return;
      var target=frame.getAttribute('data-agf-frame-src');
      if(target && !frame.getAttribute('src')) frame.setAttribute('src',target);
      setTimeout(function(){
        if(target && frame && !frame.getAttribute('src')) frame.setAttribute('src',target);
      },600);
    })();
  </script>
  <script src="/shared/ui/agf-ui.js"></script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/atende/sw.js').catch(()=>{}));}</script>
</body>
</html>
