<body>
  <div class="cep-page">
    <header class="cep-header agf-standard-topbar">
      <div class="cep-container cep-header-inner agf-standard-topbar-inner">
        <a class="cep-brand agf-standard-brand" href="/" aria-label="Voltar para início">
          <span class="logo-circle agf-standard-brand-tile">

          </span>
          <span class="agf-standard-copy"><strong>Consulta CEP</strong><small>AGF JOSÉ BONIFÁCIO</small></span>
        </a>
        <nav class="cep-header-actions agf-standard-actions" aria-label="Ações rápidas">
          <a class="cep-header-link agf-standard-action" href="/app/" target="_blank" rel="noopener noreferrer"><span class="material-symbols-rounded" aria-hidden="true">sell</span><span>Postagens</span></a>
          <a class="cep-header-link agf-standard-action" href="/"><span class="material-symbols-rounded" aria-hidden="true">home</span><span>Início</span></a>
        </nav>
      </div>
    </header>

    <main class="cep-main">
      <div class="cep-container">
        <section class="cep-copy" aria-labelledby="cep-title">
          <div class="cep-pill">
            <span class="material-symbols-rounded" aria-hidden="true">bolt</span>
            Consulta rápida
          </div>

          <h1 class="cep-title" id="cep-title">Busca de CEP e Endereços</h1>

          <div class="cep-widget-wrap agf-address-widget">
            <form class="agf-address-search-card" id="cep-form" autocomplete="off">
              <div class="agf-address-search-row">
                <label class="agf-address-field" for="cep-query">
                  <span class="material-symbols-rounded" aria-hidden="true">search</span>
                  <input
                    class="agf-address-input"
                    id="cep-query"
                    name="q"
                    type="search"
                    inputmode="search"
                    placeholder="Digite CEP ou endereço"
                    aria-label="Digite CEP ou endereço"
                  />
                </label>

                <button class="agf-address-button" id="cep-submit" type="submit">
                  <span class="material-symbols-rounded" aria-hidden="true">search</span>
                  Consultar
                </button>
              </div>

              <div class="agf-address-status" id="cep-status" role="status" aria-live="polite"></div>
              <div class="agf-address-results" id="cep-results"></div>
            </form>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="/shared/address/address-config.js"></script>
  <script src="/shared/address/address-client.js"></script>
  <script src="/cep/cep-page.js"></script>
<script src="/shared/ui/agf-ui.js"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/cep/sw.js').catch(()=>{}));}</script>
