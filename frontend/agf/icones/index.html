<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"><meta name="theme-color" content="#00416B">
<title>Biblioteca de ícones — AGF José Bonifácio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=swap" rel="stylesheet">
<link rel="manifest" href="/agf/manifest.webmanifest"><link rel="icon" href="/assets/pwa/agf/favicon.ico"><link rel="stylesheet" href="/shared/ui/agf-ui.css?v=ver-senha-v3"><link rel="stylesheet" href="/agf/agf.css?v=ver-senha-v3"><link rel="stylesheet" href="/agf/icones/icones.css">
<script src="/shared/auth/agf-auth-config.js"></script><script src="/shared/auth/agf-auth-client.js"></script><script>window.AGF_ACCESS={roles:['admin']};</script><script src="/shared/auth/agf-route-guard.js"></script>
</head>
<body>
<header class="portal-topbar"><div class="portal-topbar-inner"><a class="portal-brand" href="/agf/"><span class="agf-brand-tile"><span class="material-symbols-rounded" data-agf-icon="palette">palette</span></span><span class="portal-brand-copy"><strong>Biblioteca de ícones</strong><small>AGF JOSÉ BONIFÁCIO</small></span></a><div class="portal-top-actions"><a class="agf-icon-button" href="/agf/"><span class="material-symbols-rounded" data-agf-icon="arrow_back">arrow_back</span><span>Voltar</span></a><button class="agf-icon-button" id="logoutButton" type="button"><span class="material-symbols-rounded" data-agf-icon="logout">logout</span><span>Sair</span></button></div></div></header>
<main class="icons-main">
  <section class="icons-toolbar">
    <div><h1>Biblioteca visual</h1><p>Catálogo construído a partir dos ícones encontrados nas páginas internas. Pesquise, altere o símbolo Material e escolha a cor. Elementos equivalentes são atualizados em conjunto.</p></div>
    <label class="icons-search"><span class="material-symbols-rounded">search</span><input id="iconSearch" type="search" placeholder="Buscar por nome ou símbolo" autocomplete="off"><strong id="iconsCount">0</strong></label>
  </section>
  <form id="iconsForm"><div id="iconsGrid" class="icons-groups"></div><div class="icons-actions"><span id="iconsStatus" class="icons-status" aria-live="polite"></span><button id="resetButton" class="icons-button" type="button"><span class="material-symbols-rounded">restart_alt</span>Restaurar</button><button id="reloadButton" class="icons-button" type="button"><span class="material-symbols-rounded">refresh</span>Recarregar</button><button class="icons-button primary" type="submit"><span class="material-symbols-rounded">save</span>Salvar</button></div></form>
</main>
<script src="/shared/ui/agf-ui.js?v=ver-senha-v3"></script><script src="/agf/icones/icones.js"></script>
</body></html>
