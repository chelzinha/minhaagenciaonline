<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0E3E6C">
  <title>Logística Reversa</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/tokens.css?v=20260615-reverso-v167">
  <link rel="stylesheet" href="./styles/base.css?v=20260615-reverso-v167">
  <link rel="stylesheet" href="./styles/components.css?v=20260615-reverso-v167">
  <link rel="stylesheet" href="./styles/screens.css?v=20260615-reverso-v167">
</head>
<body class="app-booting reverso-app">
  <div class="loading" id="loading" aria-hidden="true">
    <div class="loading-card"><div class="spinner"></div><div id="loadingText">Preparando o atendimento...</div></div>
  </div>
  <div class="toast" id="toast" aria-live="polite"></div>

  <div id="appRoot" class="app-shell hidden">
    <main class="screen-mount" id="screenMount"></main>

    <nav class="bottom-nav bottom-nav-public" id="bottomNav">
      <button data-route="/home" class="is-active"><span class="material-symbols-rounded">home</span><span>Início</span></button>
      <button data-route="/nova"><span class="material-symbols-rounded">package_2</span><span>Nova devolução</span></button>
      <button data-route="/historico"><span class="material-symbols-rounded">history</span><span>Histórico</span></button>
    </nav>
  </div>

  <template id="tpl-boot">
    <section class="screen screen-login screen-login-ios">
      <div class="ios-bg-orb ios-bg-orb-a"></div>
      <div class="ios-bg-orb ios-bg-orb-b"></div>
      <div class="ios-login-wrap">
        <div class="ios-brand-block">
          <img src="./assets/logo-logistica-reversa-horizontal-transparent-v2.png" alt="Logística Reversa AGF José Bonifácio" class="ios-brand-logo">
        </div>

        <form id="bootForm" class="ios-card stack-md">
          <div class="ios-card-head">
            <h2 class="ios-card-title">Acesse sua unidade</h2>
            <p class="ios-card-subtitle">Quando o acesso é feito pelo QR Code da unidade,<br>o campo será preenchido automaticamente.</p>
          </div>

          <label class="field field-with-icon">
            <div class="ios-input-shell input-shell">
              <span class="input-leading material-symbols-rounded">apartment</span>
              <input id="bootSlugInput" class="input input-with-leading ios-input" placeholder="Digite o nome da sua unidade">
            </div>
          </label>

          <button class="btn btn-primary btn-block btn-lg ios-primary-btn" id="bootContinueBtn" type="submit"><span class="material-symbols-rounded">arrow_forward</span>Continuar</button>

          <div class="ios-note-card">
            <span class="material-symbols-rounded">info</span>
            <span>Informe seu CPF no próximo passo para<br>registrar e consultar as suas devoluções.</span>
          </div>
        </form>
      </div>
    </section>
  </template>

  <template id="tpl-auth">
    <section class="screen screen-auth screen-auth-ios">
      <div class="page page-narrow">
        <div class="ios-auth-brand-card">
          <div class="ios-auth-logos-row">
            <img src="./assets/logo-logistica-reversa-horizontal-transparent-v2.png" alt="Logística Reversa AGF José Bonifácio" class="ios-auth-logo">
            <h1 class="hero-title auth-brand-title" id="authUnitTitle">Carregando os dados da unidade...</h1>
          </div>
        </div>
        <div class="card ios-auth-card">
          <div class="segmented" id="authMode">
            <button class="segmented-btn is-active" data-mode="login">Entrar</button>
            <button class="segmented-btn" data-mode="cadastro">Primeiro acesso</button>
          </div>
          <p class="auth-mode-helper" id="authModeHelper">Entre com seu CPF ou faça seu primeiro acesso.</p>
          <form id="authForm" class="stack-md form-grid">
            <label class="field col-span-2"><span class="field-label">Unidade</span><input id="authUnidadeNome" class="input" disabled></label>
            <label class="field col-span-2"><span class="field-label">CPF</span><input id="authCpf" class="input" inputmode="numeric" placeholder="000.000.000-00"></label>
            <div id="authCadastroFields" class="form-grid col-span-2 hidden">
              <label class="field col-span-2"><span class="field-label">Nome completo</span><input id="authNome" class="input"></label>
              <label class="field"><span class="field-label">Sala / Setor / Apto</span><input id="authSala" class="input"></label>
              <label class="field"><span class="field-label">Telefone</span><input id="authTelefone" class="input" inputmode="tel" placeholder="(00) 00000-0000"></label>
              <label class="field col-span-2"><span class="field-label">E-mail</span><input id="authEmail" class="input" type="email"></label>
              <label class="checkbox col-span-2"><input id="authAceite" type="checkbox" checked><span>Li e concordo com as regras de uso deste ponto de coleta.</span></label>
            </div>
            <div class="actions col-span-2 auth-actions-grid">
              <button type="button" class="btn btn-ghost btn-block ios-secondary-btn" id="btnBackToBoot"><span class="material-symbols-rounded">arrow_back</span>Alterar unidade</button>
              <button type="submit" class="btn btn-primary btn-block ios-primary-btn">Continuar</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-home">
    <section class="screen"><div class="page">
      <div class="hero-card hero-card-navy">
        <div class="hero-utility-row">
          <div class="hero-kicker" id="homeKicker">Sua unidade</div>
          <div class="hero-inline-actions">
            <button class="hero-link-btn" id="btnQuickHistory"><span class="material-symbols-rounded">history</span>Histórico</button>
            <button class="hero-link-btn" id="btnQuickLogout"><span class="material-symbols-rounded">logout</span>Sair</button>
          </div>
        </div>
        <h1 class="hero-title" id="homeTitle">Unidade</h1>
        <p class="hero-subtitle" id="homeSubtitle">Coleta em até 3 dias úteis.</p>
        <div class="hero-chips" id="homeChips"></div>
      </div>
      <div class="card">
        <div class="card-head"><div><h2 class="card-title">Agenda de disponibilidade</h2><p class="card-subtitle">Mesmo que o ponto esteja indisponível agora, você sempre verá a próxima data disponível.</p></div></div>
        <div class="calendar-grid" id="availabilityGrid"></div>
      </div>
      <div class="card"><div class="stack-sm">
        <button class="btn btn-primary btn-lg btn-block" id="btnStartNova"><span class="material-symbols-rounded">package_2</span>Nova devolução</button>
        <button class="btn btn-ghost btn-block" id="btnOpenInstructions"><span class="material-symbols-rounded">help</span>Ver instruções de uso</button>
      </div></div>
    </div></section>
  </template>

  <template id="tpl-nova">
    <section class="screen"><div class="page">
      <div class="stepper">
        <div class="step is-active"><span>1</span><small>Etiqueta</small></div>
        <div class="step"><span>2</span><small>Autorização</small></div>
        <div class="step"><span>3</span><small>Confirmar</small></div>
      </div>
      <div class="card">
        <div class="card-head"><div><h2 class="card-title">Antes de começar</h2><p class="card-subtitle">Retire uma etiqueta, escaneie o QR ou digite o código manual impresso.</p></div></div>
        <div class="notice notice-info notice-rule"><span class="material-symbols-rounded">info</span><div class="notice-rule-copy"><strong>Regra de uso:</strong><span class="notice-rule-line">1 etiqueta = 1 objeto = 1 autorização.</span></div></div>
        <div class="actions two-col">
          <button class="btn btn-primary btn-block" id="btnScanEtiqueta"><span class="material-symbols-rounded">qr_code_scanner</span>Ler etiqueta</button>
          <button class="btn btn-ghost btn-block" id="btnManualEtiqueta"><span class="material-symbols-rounded">keyboard</span>Digitar código</button>
        </div>
        <form id="etiquetaManualForm" class="stack-md hidden top-gap">
          <label class="field"><span class="field-label">Código da etiqueta</span><input id="manualEtiquetaInput" class="input" placeholder="Ex.: EDM-000001"></label>
          <button class="btn btn-primary btn-block" type="submit">Validar etiqueta</button>
        </form>
        <div id="etiquetaResult" class="top-gap hidden"></div>
      </div>
    </div></section>
  </template>

  <template id="tpl-form-reversa">
    <section class="screen"><div class="page">
      <div class="stepper">
        <div class="step is-done"><span class="material-symbols-rounded">check</span><small>Etiqueta</small></div>
        <div class="step is-active"><span>2</span><small>Autorização</small></div>
        <div class="step"><span>3</span><small>Confirmar</small></div>
      </div>
      <form id="reversaForm" class="card stack-md">
        <div class="kv-list">
          <div><span>Unidade</span><strong id="formUnitName"></strong></div>
          <div><span>Etiqueta</span><strong id="formEtiquetaCode"></strong></div>
        </div>
        <label class="field"><span class="field-label">Código de autorização</span><input id="codigoAutorizacao" class="input" required></label>
        <label class="field"><span class="field-label">Datas disponíveis</span><select id="janelaColeta" class="input" required></select></label>
        <div class="form-grid">
          <label class="field"><span class="field-label">Comprimento (cm)</span><input id="comprimentoCm" class="input" inputmode="decimal" placeholder="20"></label>
          <label class="field"><span class="field-label">Largura (cm)</span><input id="larguraCm" class="input" inputmode="decimal" placeholder="15"></label>
          <label class="field"><span class="field-label">Altura (cm)</span><input id="alturaCm" class="input" inputmode="decimal" placeholder="10"></label>
        </div>
        <label class="field"><span class="field-label">Observação (opcional)</span><textarea id="observacao" class="textarea" placeholder="Ex.: caixa amassada, produto frágil..."></textarea></label>
        <div class="actions"><button class="btn btn-primary btn-block" type="submit">Continuar</button></div>
      </form>
    </div></section>
  </template>

  <template id="tpl-confirm">
    <section class="screen"><div class="page">
      <div class="stepper">
        <div class="step is-done"><span class="material-symbols-rounded">check</span><small>Etiqueta</small></div>
        <div class="step is-done"><span class="material-symbols-rounded">check</span><small>Autorização</small></div>
        <div class="step is-active"><span>3</span><small>Confirmar</small></div>
      </div>
      <div class="card">
        <div class="card-head"><div><h2 class="card-title">Confirmação final</h2><p class="card-subtitle">Confira os dados antes de colar a etiqueta no objeto e fazer o drop-off.</p></div></div>
        <div class="kv-list" id="confirmSummary"></div>
        <div class="notice notice-warn"><span class="material-symbols-rounded">warning</span><div>Você confirma que colou esta etiqueta no objeto correto, está usando a unidade certa e vai depositar o objeto agora no coletor.</div></div>
        <label class="checkbox"><input id="confirmChecklist" type="checkbox"><span>Confirmo que li e entendi as regras acima.</span></label>
        <div class="actions"><button class="btn btn-ghost" id="btnBackToForm">Voltar</button><button class="btn btn-primary" id="btnConfirmDropoff">Confirmar e registrar drop-off</button></div>
      </div>
    </div></section>
  </template>

  <template id="tpl-success">
    <section class="screen"><div class="page page-narrow">
      <div class="success-card">
        <div class="success-icon"><span class="material-symbols-rounded">check_circle</span></div>
        <h1 class="success-title">Drop-off registrado com sucesso</h1>
        <p class="success-subtitle">A coleta da AGF acontecerá dentro do prazo disponível informado.</p>
        <div class="kv-list" id="successSummary"></div>
        <div class="actions stack-sm"><button class="btn btn-primary btn-block" id="btnSuccessHistory">Ver meu histórico</button><button class="btn btn-ghost btn-block" id="btnSuccessHome">Voltar ao início</button></div>
      </div>
    </div></section>
  </template>

  <template id="tpl-historico">
    <section class="screen"><div class="page">
      <div class="section-head">
        <div><h1 class="section-title">Meu histórico</h1><p class="section-subtitle">Acompanhe suas devoluções já registradas.</p></div>
        <button class="btn btn-ghost btn-sm" id="btnHistoryLogout"><span class="material-symbols-rounded">logout</span>Sair</button>
      </div>
      <div id="historyList" class="stack-md"></div>
    </div></section>
  </template>

  <template id="tpl-detalhe">
    <section class="screen"><div class="page page-narrow">
      <button class="btn btn-ghost btn-sm back-btn" id="btnBackHistory"><span class="material-symbols-rounded">arrow_back</span>Voltar</button>
      <div class="card"><div class="card-head"><h1 class="card-title">Detalhe do objeto</h1></div><div class="kv-list" id="detailSummary"></div></div>
    </div></section>
  </template>

  <script type="module" src="./js/app.js?v=20260615-reverso-v167"></script>
</body>
</html>
