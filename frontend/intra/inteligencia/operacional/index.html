<script>
window.addEventListener('load', function () {
  bootIntelPage('operacional').catch(function (err) {
    console.error(err);
    var filters = document.getElementById('filters-root');
    var cards = document.getElementById('cards-root');
    if (filters) {
      filters.innerHTML = '<div class="intel-empty">Falha ao carregar filtros: ' + (err && err.message ? err.message : err) + '</div>';
    }
    if (cards) {
      cards.innerHTML = '<div class="intel-empty">Falha ao carregar a página.</div>';
    }
  });
});
</script>
