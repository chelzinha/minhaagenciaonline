<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#00416B"/>
<title>Sem conexão — AGF José Bonifácio</title>
<link rel="manifest" href="/intra/manifest.webmanifest"/>
<link rel="apple-touch-icon" href="/assets/pwa/intra/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#005A8F 0%,#00416B 60%);color:#fff;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{max-width:420px;text-align:center}
  .material-symbols-rounded{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;font-size:48px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased}
  .icon{width:96px;height:96px;border-radius:24px;background:rgba(255,255,255,.12);display:grid;place-items:center;margin:0 auto 24px;font-size:48px;border:1px solid rgba(255,255,255,.18)}
  h1{margin:0 0 12px;font-size:26px;font-weight:900}
  p{margin:0 0 22px;font-size:15px;font-weight:500;opacity:.86;line-height:1.5}
  button{background:#FFD400;color:#00416B;border:none;border-radius:999px;padding:14px 28px;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 8px 24px rgba(255,212,0,.3)}
  button:hover{filter:brightness(1.05)}
  .home{display:block;margin-top:16px;color:rgba(255,255,255,.86);text-decoration:none;font-weight:700;font-size:13px}
  .home:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon"><span class="material-symbols-rounded">wifi_off</span></div>
  <h1>Sem conexão</h1>
  <p>Você está offline. Algumas páginas podem ter sido salvas e ainda funcionar — toque em uma delas.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
  <a class="home" href="/intra/">Voltar ao painel interno</a>
</div>
</body>
</html>
